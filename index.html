<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Martic Solutions - Intelligente KI-Lösungen für Handwerksbetriebe</title>

    <!-- ✅ Meta Description -->
    <meta name="description" content="Martic Solutions bietet individuelle KI-gestützte Softwarelösungen für Handwerksbetriebe. Effizient, innovativ, praxisnah." />
    <meta property="og:image" content="https://marticsolutions.de/images/mainimage.jpg" />

    <!-- ✅ Favicon (optimiert für Google Search) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ✅ OpenGraph für Social Media -->
    <meta property="og:title" content="Martic Solutions - KI-Lösungen für Handwerksbetriebe" />
    <meta property="og:description" content="Moderne KI-Anwendungen, die Prozesse in Handwerksunternehmen vereinfachen und automatisieren." />
    <meta property="og:image" content="https://marticsolutions.de/public/mainimage.jpg" />
    <meta property="og:url" content="https://marticsolutions.de" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Martic Solutions - KI für Handwerksbetriebe" />
    <meta name="twitter:description" content="Moderne, intelligente Lösungen speziell für kleine und mittlere Handwerksbetriebe." />
    <meta name="twitter:image" content="https://marticsolutions.de/public/mainimage.jpg" />

    <!-- ✅ Canonical Link -->
    <link rel="canonical" href="https://marticsolutions.de" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />
    
    <!-- ✅ n8n Chatbot Styles -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    
    <!-- ✅ Martic Solutions Chat Branding -->
    <style>
      :root {
        /* Martic Solutions Farben */
        --chat--color-primary: #2563eb;           /* Professionelles Blau */
        --chat--color-primary-shade-50: #1d4ed8;
        --chat--color-primary-shade-100: #1e40af;
        --chat--color-secondary: #10b981;         /* Grün für Akzente */
        --chat--color-secondary-shade-50: #059669;
        
        /* Moderne Farbpalette */
        --chat--color-white: #ffffff;
        --chat--color-light: #f8fafc;
        --chat--color-light-shade-50: #f1f5f9;
        --chat--color-medium: #e2e8f0;
        --chat--color-dark: #1e293b;              /* Dunkles Grau */
        --chat--color-disabled: #64748b;
        
        /* Chat-Fenster Größe */
        --chat--window--width: 420px;
        --chat--window--height: 650px;
        
        /* Header Styling */
        --chat--header--background: linear-gradient(135deg, var(--chat--color-primary) 0%, var(--chat--color-primary-shade-100) 100%);
        --chat--header--color: var(--chat--color-white);
        --chat--header--padding: 1.5rem 1rem;
        --chat--heading--font-size: 1.25rem;
        --chat--subtitle--font-size: 0.875rem;
        
        /* Nachrichten Styling */
        --chat--message--font-size: 0.95rem;
        --chat--message--border-radius: 12px;
        --chat--message--bot--background: #f1f5f9;
        --chat--message--bot--color: var(--chat--color-dark);
        --chat--message--user--background: var(--chat--color-primary);
        --chat--message--user--color: var(--chat--color-white);
        
        /* Chat Toggle Button */
        --chat--toggle--background: var(--chat--color-primary);
        --chat--toggle--hover--background: var(--chat--color-primary-shade-50);
        --chat--toggle--size: 60px;
        
        /* Textarea */
        --chat--textarea--height: 60px;
        
        /* Border Radius für modernen Look */
        --chat--border-radius: 8px;
      }
      
      /* Zusätzliches Styling für professionellen Look */
      .n8n-chat {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        border-radius: 12px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- ✅ n8n Chatbot Integration -->
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://n8n.marticsolutions.de/webhook/d552c7ae-632d-4308-823f-04b26ae22544/chat',
        
        // Chat-Konfiguration
        mode: 'window',
        showWelcomeScreen: true,
        loadPreviousSession: true,
        defaultLanguage: 'de',
        
        // Deutsche Begrüßungsnachrichten für Handwerksbetriebe
        initialMessages: [
          'Hallo! 👋 Willkommen bei Martic Solutions!',
          'Ich bin Ihr KI-Assistent für digitale Lösungen im Handwerk. Wie kann ich Ihnen heute helfen?'
        ],
        
        // Deutsche Texte (i18n)
        i18n: {
          de: {
            title: 'Martic Solutions 🔧',
            subtitle: 'KI-Beratung für Handwerksbetriebe - Wir sind 24/7 für Sie da!',
            footer: 'Powered by Martic Solutions',
            getStarted: 'Chat starten',
            inputPlaceholder: 'Stellen Sie Ihre Frage über KI im Handwerk...'
          }
        },
        
        // Zusätzliche Metadaten
        metadata: {
          source: 'website',
          company: 'martic-solutions',
          industry: 'handwerk'
        }
      });
    </script>
  </body>
</html>
